# ──────────────────────────────────────────────────────────────────────────────
# Docker profile — activated via SPRING_PROFILES_ACTIVE=docker in docker-compose.
# Loaded on top of application.properties; only overrides are listed here.
# ──────────────────────────────────────────────────────────────────────────────

# PostgreSQL datasource (hostname matches the service name in docker-compose.yml)
spring.datasource.url=jdbc:postgresql://db:5432/eventledgerdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=eventledger
spring.datasource.password=eventledger

# Use "update" so the schema is created on first run and preserved on restarts.
# Switch to "validate" once the schema is stable in a long-lived environment.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# H2 in-memory console is not available in this environment
spring.h2.console.enabled=false

# Quieter logging than local dev
logging.level.com.eventledger=INFO
