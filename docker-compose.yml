services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eventledgerdb
      POSTGRES_USER: eventledger
      POSTGRES_PASSWORD: eventledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventledger -d eventledgerdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Application ────────────────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
